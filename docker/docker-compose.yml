version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY:-}
      - ACLED_EMAIL=${ACLED_EMAIL:-}
      - ACLED_PASSWORD=${ACLED_PASSWORD:-}
      - GDELT_REFRESH_SECONDS=${GDELT_REFRESH_SECONDS:-900}
      - ACLED_REFRESH_SECONDS=${ACLED_REFRESH_SECONDS:-86400}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - NODE_ENV=development
      - VITE_PROXY_TARGET=http://backend:8000
      - VITE_WS_PROXY_TARGET=ws://backend:8000
    depends_on:
      backend:
        condition: service_healthy
